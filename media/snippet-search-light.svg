<svg width="800" height="400" viewBox="0 0 800 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="search-beam-light" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Search Bar -->
  <g transform="translate(250, 60)">
    <rect x="0" y="0" width="300" height="44" rx="22" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
    <circle cx="30" cy="22" r="12" fill="none" stroke="#64748b" stroke-width="2"/>
    <path d="M 38 30 L 46 38" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <text x="60" y="28" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14">Search snippets...</text>
  </g>

  <!-- Search beam effect -->
  <path d="M 400 104 L 200 180 L 200 320 L 600 320 L 600 180 Z" fill="url(#search-beam-light)"/>

  <!-- Snippet Cards Grid -->
  <!-- Card 1 - Top Left -->
  <g transform="translate(80, 140)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#e2e8f0"/>
    <rect x="0" y="20" width="180" height="8" fill="#e2e8f0"/>
    <text x="12" y="19" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">eventTime.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="10">
      <text x="12" y="48" fill="#1e293b" font-weight="600">{</text>
      <text x="20" y="62" fill="#7e22ce">"type": "string",</text>
      <text x="20" y="76" fill="#0f766e">"format": "date-time"</text>
      <text x="12" y="90" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>

  <!-- Card 2 - Top Center (Highlighted) -->
  <g transform="translate(310, 140)">
    <rect x="-4" y="-4" width="188" height="128" rx="10" fill="none" stroke="#3b82f6" stroke-width="3" stroke-opacity="0.5"/>
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#f8fafc" stroke="#3b82f6" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#dbeafe"/>
    <rect x="0" y="20" width="180" height="8" fill="#dbeafe"/>
    <text x="12" y="19" fill="#1e40af" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">bizStep.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="10">
      <text x="12" y="48" fill="#1e293b" font-weight="600">{</text>
      <text x="20" y="62" fill="#7e22ce">"type": "string",</text>
      <text x="20" y="76" fill="#0f766e">"enum": [...]</text>
      <text x="12" y="90" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>

  <!-- Card 3 - Top Right -->
  <g transform="translate(540, 140)">
    <rect x="0" y="0" width="180" height="120" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="0" y="0" width="180" height="28" rx="8" fill="#e2e8f0"/>
    <rect x="0" y="20" width="180" height="8" fill="#e2e8f0"/>
    <text x="12" y="19" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="600">epcList.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="10">
      <text x="12" y="48" fill="#1e293b" font-weight="600">{</text>
      <text x="20" y="62" fill="#7e22ce">"type": "array",</text>
      <text x="20" y="76" fill="#0f766e">"items": {...}</text>
      <text x="12" y="90" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>

  <!-- Card 4 - Bottom Left -->
  <g transform="translate(140, 280)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="24" rx="8" fill="#e2e8f0"/>
    <rect x="0" y="16" width="160" height="8" fill="#e2e8f0"/>
    <text x="10" y="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">readPoint.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="9">
      <text x="10" y="42" fill="#1e293b" font-weight="600">{</text>
      <text x="18" y="54" fill="#475569">"type": "object"</text>
      <text x="10" y="66" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>

  <!-- Card 5 - Bottom Center -->
  <g transform="translate(320, 280)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="24" rx="8" fill="#e2e8f0"/>
    <rect x="0" y="16" width="160" height="8" fill="#e2e8f0"/>
    <text x="10" y="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">action.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="9">
      <text x="10" y="42" fill="#1e293b" font-weight="600">{</text>
      <text x="18" y="54" fill="#475569">"enum": [...]</text>
      <text x="10" y="66" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>

  <!-- Card 6 - Bottom Right -->
  <g transform="translate(500, 280)">
    <rect x="0" y="0" width="160" height="90" rx="8" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
    <rect x="0" y="0" width="160" height="24" rx="8" fill="#e2e8f0"/>
    <rect x="0" y="16" width="160" height="8" fill="#e2e8f0"/>
    <text x="10" y="16" fill="#475569" font-family="system-ui, -apple-system, sans-serif" font-size="10" font-weight="600">disposition.json</text>
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="9">
      <text x="10" y="42" fill="#1e293b" font-weight="600">{</text>
      <text x="18" y="54" fill="#475569">"type": "string"</text>
      <text x="10" y="66" fill="#1e293b" font-weight="600">}</text>
    </g>
  </g>
</svg>
