<svg width="800" height="400" viewBox="0 0 800 400" fill="none"
  xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid-dark" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#475569" stroke-width="0.5"/>
    </pattern>
    <marker id="arrow-dark" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- User Icon (Left) - Light colors for dark mode -->
  <g transform="translate(60, 160)">
    <!-- Head -->
    <circle cx="0" cy="0" r="24" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <!-- Body -->
    <path d="M-20,50 C-20,25 20,25 20,50" fill="none" stroke="#94a3b8" stroke-width="2.5"/>
    <!-- Document in hand -->
    <rect x="-30" y="60" width="60" height="45" rx="4" fill="none" stroke="#94a3b8" stroke-width="2"/>
    <line x1="-20" y1="72" x2="20" y2="72" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="-20" y1="82" x2="10" y2="82" stroke="#94a3b8" stroke-width="1.5"/>
    <line x1="-20" y1="92" x2="15" y2="92" stroke="#94a3b8" stroke-width="1.5"/>
  </g>

  <!-- Arrow Lines to Dimensions -->
  <g stroke="#94a3b8" stroke-width="2" fill="none">
    <path d="M 120 200 L 240 89" marker-end="url(#arrow-dark)"/>
    <path d="M 120 200 L 240 149" marker-end="url(#arrow-dark)"/>
    <path d="M 120 200 L 240 209" marker-end="url(#arrow-dark)"/>
    <path d="M 120 200 L 240 269" marker-end="url(#arrow-dark)"/>
    <path d="M 120 200 L 240 329" marker-end="url(#arrow-dark)"/>
  </g>

  <!-- EPCIS Dimensions -->
  <g transform="translate(250, 70)">
    <!-- WHAT -->
    <g>
      <rect width="110" height="38" rx="6" fill="#0c4a6e" stroke="#0284c7" stroke-width="2"/>
      <text x="55" y="24" fill="#bae6fd" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">WHAT</text>
    </g>

    <!-- WHEN -->
    <g transform="translate(0, 60)">
      <rect width="110" height="38" rx="6" fill="#581c87" stroke="#9333ea" stroke-width="2"/>
      <text x="55" y="24" fill="#e9d5ff" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">WHEN</text>
    </g>

    <!-- WHERE -->
    <g transform="translate(0, 120)">
      <rect width="110" height="38" rx="6" fill="#134e4a" stroke="#0d9488" stroke-width="2"/>
      <text x="55" y="24" fill="#99f6e4" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">WHERE</text>
    </g>

    <!-- WHY -->
    <g transform="translate(0, 180)">
      <rect width="110" height="38" rx="6" fill="#713f12" stroke="#ca8a04" stroke-width="2"/>
      <text x="55" y="24" fill="#fef08a" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">WHY</text>
    </g>

    <!-- HOW -->
    <g transform="translate(0, 240)">
      <rect width="110" height="38" rx="6" fill="#164e63" stroke="#0891b2" stroke-width="2"/>
      <text x="55" y="24" fill="#a5f3fc" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="600" text-anchor="middle">HOW</text>
    </g>
  </g>

  <!-- Connecting Curves to JSON - adjusted to point to center of JSON window -->
  <g fill="none" stroke-width="2.5">
    <path d="M 360 89 C 420 89, 460 156, 490 156" stroke="#0284c7"/>
    <path d="M 360 149 C 420 149, 460 176, 490 176" stroke="#9333ea"/>
    <path d="M 360 209 C 420 209, 460 196, 490 196" stroke="#0d9488"/>
    <path d="M 360 269 C 420 269, 460 216, 490 216" stroke="#ca8a04"/>
    <path d="M 360 329 C 420 329, 460 236, 490 236" stroke="#0891b2"/>
  </g>

  <!-- JSON Document Window -->
  <g transform="translate(490, 80)">
    <!-- Window frame - darker background for dark mode -->
    <rect x="0" y="0" width="200" height="200" rx="8" fill="#0f172a" stroke="#475569" stroke-width="2"/>

    <!-- Window header -->
    <rect x="0" y="0" width="200" height="32" rx="8" fill="#1e293b"/>
    <rect x="0" y="24" width="200" height="8" fill="#1e293b"/>

    <!-- Window controls -->
    <circle cx="16" cy="16" r="5" fill="#ef4444"/>
    <circle cx="32" cy="16" r="5" fill="#f59e0b"/>
    <circle cx="48" cy="16" r="5" fill="#10b981"/>

    <!-- JSON Content - white/light text for dark mode -->
    <g font-family="'Monaco', 'Menlo', 'Consolas', monospace" font-size="12">
      <text x="16" y="56" fill="#f8fafc" font-weight="600">{</text>

      <text x="48" y="76" fill="#38bdf8" font-weight="600">"what": {...},</text>
      <text x="48" y="96" fill="#c084fc" font-weight="600">"when": {...},</text>
      <text x="48" y="116" fill="#2dd4bf" font-weight="600">"where": {...},</text>
      <text x="48" y="136" fill="#facc15" font-weight="600">"why": {...},</text>
      <text x="48" y="156" fill="#22d3ee" font-weight="600">"how": {...}</text>

      <text x="16" y="176" fill="#f8fafc" font-weight="600">}</text>
    </g>
  </g>
</svg>
